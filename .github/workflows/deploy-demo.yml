name: Deploy demo to Cloudflare Pages

# Publishes the self-contained interactive demo (docs/demo) to Cloudflare Pages
# whenever it changes on main, so the live demo stays in step with development.
# Manual runs are allowed too (workflow_dispatch).
#
# One-time setup (in the repo's Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN   - a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
# Until those are set the deploy step is skipped (the workflow still passes).
# The Pages project is named "foodassistant-demo"; the first deploy creates it,
# and the site lands at https://foodassistant-demo.pages.dev.

on:
  push:
    branches: [main]
    paths:
      - 'docs/demo/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Cloudflare credentials
        id: check
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not set; skipping deploy. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo settings to enable it."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/demo --project-name=foodassistant-demo --branch=main
